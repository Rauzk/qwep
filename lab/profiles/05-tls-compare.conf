# =============================================================================
# PROFILE 05 — 明文 1883 + TLS 8883 对照
# 用途：同一账号、同一主题，一边明文可抓包，一边 TLS 只见密文
# =============================================================================

per_listener_settings true

# ---- 明文（故意保留，方便抓包对比）----
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous false
password_file /etc/mosquitto/lab/passwd
acl_file /etc/mosquitto/lab/acl/strict.acl

# ---- TLS ----
listener 8883 0.0.0.0
protocol mqtt
allow_anonymous false
password_file /etc/mosquitto/lab/passwd
acl_file /etc/mosquitto/lab/acl/strict.acl
cafile /etc/mosquitto/lab/certs/ca.crt
certfile /etc/mosquitto/lab/certs/server.crt
keyfile /etc/mosquitto/lab/certs/server.key
require_certificate false

# WebSocket 明文
listener 9001 0.0.0.0
protocol websockets
allow_anonymous false
password_file /etc/mosquitto/lab/passwd
acl_file /etc/mosquitto/lab/acl/strict.acl

sys_interval 10
