# =============================================================================
# PROFILE 01 — 漏洞态：匿名 + 明文 + 无 ACL
# 用途：匿名访问、主题遍历、明文抓包、消息伪造、QoS、轻量 DoS
# LAB ONLY，不要暴露到公网
# =============================================================================

per_listener_settings true

# 弱口令文件仍挂上：匿名可用，带账号也能连（后面爆破对照用同一份）
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true
password_file /etc/mosquitto/lab/passwd

listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
password_file /etc/mosquitto/lab/passwd

# 无 acl_file = 任意主题读写（含 $SYS）
sys_interval 10
max_keepalive 65535
max_packet_size 268435455
max_connections -1
